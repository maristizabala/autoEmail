name: release-please
on:
  push:
    branches:
      - main # nombre de la rama principal

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          # Define el tipo de proyecto (node, python, java, etc.)
          release-type: node
