# Configuración de Nginx para AutoReport + Latinia (SSL activado)

server {
    listen 8004 ssl;
    server_name localhost;

    # Certificados SSL (Autofirmados para notificaciones de navegador)
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Protocolos y Cifrados recomendados
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';

    # Servir archivos estáticos del frontend (Vite build)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para Jira con enmascaramiento de XSRF
    location /jira-api/ {
        # Reescribir la ruta eliminando /jira-api
        rewrite ^/jira-api/(.*) /$1 break;
        
        proxy_pass https://latinia.atlassian.net;
        proxy_set_header Host latinia.atlassian.net;
        
        # ELIMINAR Origin y Referer originales para evitar error 403
        proxy_set_header Origin "https://latinia.atlassian.net";
        proxy_set_header Referer "https://latinia.atlassian.net/";
        
        # FORZAR cabeceras de bypass de XSRF
        proxy_set_header X-Atlassian-Token "no-check";
        proxy_set_header X-Requested-With "XMLHttpRequest";
        
        # Opcional: Cambiar User-Agent para mayor seguridad
        proxy_set_header User-Agent "AutoReport-Tool/1.0";

        # Configuración de SSL y CORS
        proxy_ssl_server_name on;
        proxy_hide_header 'Access-Control-Allow-Origin';
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Proxy para la API de Tempo
    location /tempo-api/ {
        # Reescribir la ruta eliminando /tempo-api
        rewrite ^/tempo-api/(.*) /$1 break;
        
        proxy_pass https://api.tempo.io;
        proxy_set_header Host api.tempo.io;
        
        # ELIMINAR Origin y Referer originales
        proxy_set_header Origin "https://api.tempo.io";
        proxy_set_header Referer "https://api.tempo.io/";

        # Configuración de SSL y CORS
        proxy_ssl_server_name on;
        proxy_hide_header 'Access-Control-Allow-Origin';
        add_header 'Access-Control-Allow-Origin' '*' always;
    }
}
