# Configuración de Nginx para SyncReport + Latinia

server {
    listen 80;
    
    # Servir archivos estáticos del frontend (Vite build)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para Jira con enmascaramiento de XSRF
    location /jira-api/ {
        # Reescribir la ruta eliminando /jira-api
        rewrite ^/jira-api/(.*) /$1 break;
        
        proxy_pass https://latinia.atlassian.net;
        proxy_set_header Host latinia.atlassian.net;
        
        # ELIMINAR Origin y Referer originales para evitar error 403
        proxy_set_header Origin "https://latinia.atlassian.net";
        proxy_set_header Referer "https://latinia.atlassian.net/";
        
        # FORZAR cabeceras de bypass de XSRF
        proxy_set_header X-Atlassian-Token "no-check";
        proxy_set_header X-Requested-With "XMLHttpRequest";
        
        # Opcional: Cambiar User-Agent para mayor seguridad
        proxy_set_header User-Agent "Atlassian-Reporter-Tool/1.0";

        # Configuración de SSL y CORS
        proxy_ssl_server_name on;
        proxy_hide_header 'Access-Control-Allow-Origin';
        add_header 'Access-Control-Allow-Origin' '*' always;
    }
}
